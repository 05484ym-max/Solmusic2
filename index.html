<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sol Music</title>

<!-- ========================================================= -->
<!-- הגדרות PWA -->
<!-- ========================================================= -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#12100E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sol Music">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --black: #0E0C0A;
    --black-soft: #17140F;
    --card: #1C1812;
    --gold: #C6A152;
    --gold-light: #E6C682;
    --text: #F3E9D2;
    --text-dim: #9C9184;
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  html{ scroll-behavior: smooth; }
  body{
    background: var(--black);
    color: var(--text);
    font-family: 'Assistant', sans-serif;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* ---------- Header ---------- */
  header{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 10px;
    padding: 14px 20px;
    border-bottom: 1px solid rgba(198,161,82,0.25);
  }
  .logo-ring{
    width: 36px; height: 36px;
    border: 1.4px solid var(--gold);
    border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
    flex-shrink: 0;
  }
  .logo-ring svg{ width: 18px; height: 18px; }
  header h1{
    font-family:'Playfair Display', serif;
    font-weight:700;
    font-size: 19px;
    letter-spacing: 0.5px;
    color: var(--gold-light);
  }
  header p{
    display:none;
  }

  /* ---------- Top-level category tabs ---------- */
  .top-cats{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding: 18px 16px 8px;
    -webkit-overflow-scrolling: touch;
  }
  .top-cats::-webkit-scrollbar{ display:none; }
  .top-cat-btn{
    flex-shrink:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    background:transparent;
    border:none;
    cursor:pointer;
    padding: 4px 2px;
    transition: transform .12s ease;
  }
  .top-cat-btn:active{ transform: scale(0.92); }
  .top-cat-circle{
    width: 54px;
    height: 54px;
    border-radius: 14px;
    border: 1.4px solid rgba(198,161,82,0.4);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Playfair Display', serif;
    font-size: 19px;
    color: var(--gold-light);
    transition: all .2s;
  }
  .top-cat-btn.active .top-cat-circle{
    background: var(--gold);
    color: var(--black);
    border-color: var(--gold);
  }
  .top-cat-label{
    font-size: 11px;
    color: var(--text-dim);
    white-space:nowrap;
  }
  .top-cat-btn.active .top-cat-label{ color: var(--gold-light); font-weight:600; }

  .current-filter-label{
    padding: 6px 16px 4px;
    font-size: 12.5px;
    color: var(--text-dim);
  }
  .current-filter-label b{ color: var(--gold-light); }

  /* ---------- Subcategory panel (bottom sheet) ---------- */
  .subcat-modal{
    position:fixed; inset:0;
    background: transparent;
    display:none;
    z-index: 900;
  }
  .subcat-modal.open{ display:block; }
  .subcat-sheet{
    position:absolute;
    width: 220px;
    max-height: 280px;
    overflow-y:auto;
    background: var(--black-soft);
    border: 1px solid rgba(198,161,82,0.4);
    border-radius: 14px;
    padding: 12px;
    box-shadow: 0 10px 28px rgba(0,0,0,0.55);
    opacity: 0;
    transform: translateY(-6px) scale(0.96);
    transform-origin: top center;
    transition: opacity .16s ease, transform .16s ease;
  }
  .subcat-modal.open .subcat-sheet{ opacity:1; transform: translateY(0) scale(1); }
  .subcat-sheet h3{
    font-family:'Playfair Display', serif;
    color: var(--gold-light);
    font-size: 13.5px;
    margin-bottom: 8px;
    text-align:center;
  }
  .subcat-item{
    width:100%;
    text-align:right;
    background: var(--card);
    border: 1px solid rgba(198,161,82,0.2);
    color: var(--text);
    padding: 9px 12px;
    border-radius: 8px;
    font-family:'Assistant', sans-serif;
    font-size: 12.5px;
    font-weight:600;
    margin-bottom: 6px;
    cursor:pointer;
    transition: transform .12s ease, background .12s ease;
  }
  .subcat-item:active{ transform: scale(0.97); background: rgba(198,161,82,0.15); }
  .subcat-item.all-item{
    color: var(--gold-light);
    border-color: var(--gold);
  }
  .subcat-close{
    display:block;
    margin: 12px auto 0;
    background:transparent;
    border:none;
    color: var(--text-dim);
    font-size: 13px;
  }

  /* ---------- Playlist add button on cards ---------- */
  .add-playlist-btn{
    position:absolute;
    top:6px;
    left:6px;
    width:24px;
    height:24px;
    border-radius:50%;
    background: rgba(14,12,10,0.75);
    border: 1px solid var(--gold);
    color: var(--gold-light);
    font-size: 16px;
    line-height:1;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition: transform .15s ease, background .15s ease;
  }
  .add-playlist-btn:active{ transform: scale(0.85); background: var(--gold); color: var(--black); }

  /* ---------- Floating playlists button ---------- */
  .fab-playlists{
    position:fixed;
    bottom: 22px;
    right: 18px;
    background: transparent;
    color: var(--gold-light);
    border: 1px solid var(--gold);
    border-radius: 24px;
    padding: 12px 18px;
    font-family:'Assistant', sans-serif;
    font-weight:700;
    font-size: 13px;
    display:flex;
    align-items:center;
    gap:7px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
    z-index: 500;
    transition: transform .15s ease;
  }
  .fab-playlists:active{ transform: scale(0.94); }
  .fab-playlists svg{ width:16px; height:16px; }

  /* ---------- Playlists modal ---------- */
  .playlists-modal{
    position:fixed; inset:0;
    background: rgba(0,0,0,0.85);
    display:flex;
    align-items:flex-end;
    justify-content:center;
    z-index: 950;
    opacity:0;
    pointer-events:none;
    transition: opacity .25s ease;
  }
  .playlists-modal.open{ opacity:1; pointer-events:auto; }
  .playlists-sheet{
    width:100%;
    max-width: 460px;
    max-height: 78vh;
    overflow-y:auto;
    background: var(--black-soft);
    border-top: 1px solid rgba(198,161,82,0.4);
    border-radius: 18px 18px 0 0;
    padding: 20px 18px 26px;
    transform: translateY(30px);
    transition: transform .25s ease;
  }
  .playlists-modal.open .playlists-sheet{ transform: translateY(0); }
  .playlists-sheet h3{
    font-family:'Playfair Display', serif;
    color: var(--gold-light);
    font-size: 18px;
    margin-bottom: 14px;
    text-align:center;
  }
  .playlist-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background: var(--card);
    border: 1px solid rgba(198,161,82,0.2);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 9px;
    cursor:pointer;
  }
  .playlist-row .pl-name{ font-size:14px; font-weight:600; color:var(--text); }
  .playlist-row .pl-count{ font-size:11.5px; color:var(--text-dim); margin-top:2px; }
  .playlist-row .pl-del{
    background:none; border:none; color: var(--danger); font-size:15px; padding:4px;
  }
  .new-playlist-row{
    display:flex; gap:8px; margin-top:14px;
  }
  .new-playlist-row input{
    flex:1;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid rgba(198,161,82,0.3);
    background: var(--card);
    color: var(--text);
    font-family:'Assistant', sans-serif;
    font-size: 13.5px;
  }
  .new-playlist-row button{
    background: var(--gold);
    color: var(--black);
    border:none;
    border-radius: 10px;
    padding: 0 18px;
    font-weight:700;
    font-size: 13px;
  }
  .modal-close.secondary{
    border-color: rgba(198,161,82,0.3);
    color: var(--text-dim);
  }
  .empty-inline{
    text-align:center;
    color: var(--text-dim);
    font-size: 13px;
    padding: 18px 0;
  }
  .quick-add-list .subcat-item{
    text-align:right;
  }

  /* ---------- YouTube Premium banner ---------- */
  .premium-banner{
    margin: 4px 16px 6px;
    background: linear-gradient(135deg, rgba(198,161,82,0.14), rgba(198,161,82,0.04));
    border: 1px solid rgba(198,161,82,0.35);
    border-radius: 14px;
    padding: 12px 14px;
    display:flex;
    align-items:center;
    gap:12px;
    cursor:pointer;
    transition: transform .12s ease;
  }
  .premium-banner:active{ transform: scale(0.98); }
  .premium-banner .yt-icon{
    flex-shrink:0;
    width: 34px;
    height: 34px;
  }
  .premium-banner .txt{ flex:1; }
  .premium-banner .txt .t1{
    font-size: 12.5px;
    font-weight:700;
    color: var(--gold-light);
  }
  .premium-banner .txt .t2{
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .premium-banner .close-x{
    background:none;
    border:none;
    color: var(--text-dim);
    font-size: 15px;
    padding: 4px;
    flex-shrink:0;
  }

  /* ---------- First-launch premium intro modal ---------- */
  .premium-intro-modal{
    position:fixed; inset:0;
    background: rgba(0,0,0,0.88);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index: 1000;
    padding: 20px;
    opacity:0;
    pointer-events:none;
    transition: opacity .25s ease;
  }
  .premium-intro-modal.open{ opacity:1; pointer-events:auto; }
  .premium-intro-card{
    width:100%;
    max-width: 380px;
    background: var(--black-soft);
    border: 1px solid rgba(198,161,82,0.4);
    border-radius: 18px;
    padding: 28px 24px 24px;
    text-align:center;
    transform: scale(0.92);
    transition: transform .25s ease;
  }
  .premium-intro-modal.open .premium-intro-card{ transform: scale(1); }
  .premium-intro-card .yt-icon-big{
    width: 56px;
    height: 56px;
    margin: 0 auto 16px;
  }
  .premium-intro-card h3{
    font-family:'Playfair Display', serif;
    color: var(--gold-light);
    font-size: 19px;
    margin-bottom: 10px;
  }
  .premium-intro-card p{
    font-size: 13.5px;
    color: var(--text-dim);
    line-height:1.6;
    margin-bottom: 22px;
  }
  .premium-intro-card .btn-row{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .premium-intro-card .btn-primary{
    background: var(--gold);
    color: var(--black);
    border:none;
    padding: 13px;
    border-radius: 12px;
    font-weight:700;
    font-size: 14px;
    font-family:'Assistant', sans-serif;
  }
  .premium-intro-card .btn-skip{
    background: transparent;
    border:none;
    color: var(--text-dim);
    font-size: 12.5px;
    padding: 4px;
  }

  /* ---------- Search bar ---------- */
  .search-wrap{
    padding: 0 16px 4px;
  }
  .search-box{
    display:flex;
    align-items:center;
    gap:8px;
    background: var(--card);
    border: 1px solid rgba(198,161,82,0.3);
    border-radius: 22px;
    padding: 9px 16px;
  }
  .search-box svg{ flex-shrink:0; width:16px; height:16px; }
  .search-box input{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color: var(--text);
    font-family:'Assistant', sans-serif;
    font-size: 14px;
  }
  .search-box input::placeholder{ color: var(--text-dim); }
  .search-clear{
    background:transparent;
    border:none;
    color: var(--text-dim);
    font-size: 16px;
    cursor:pointer;
    display:none;
    padding: 0 2px;
  }
  .search-results-label{
    padding: 14px 16px 6px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .search-results-label b{ color: var(--gold-light); }

  /* ---------- Category pills ---------- */
  .categories{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding: 18px 16px;
    -webkit-overflow-scrolling: touch;
  }
  .categories::-webkit-scrollbar{ display:none; }
  .pill{
    flex-shrink:0;
    padding: 8px 18px;
    border-radius: 20px;
    border: 1px solid rgba(198,161,82,0.4);
    color: var(--text-dim);
    font-size: 13.5px;
    font-weight:600;
    white-space: nowrap;
    cursor:pointer;
    background: transparent;
    transition: all .2s;
  }
  .pill.active, .pill:active{
    background: var(--gold);
    color: var(--black);
    border-color: var(--gold);
  }

  /* ---------- Video grid ---------- */
  .grid{
    display:grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    padding: 4px 14px 20px;
  }
  .video-card{
    background: var(--card);
    border-radius: 10px;
    overflow:hidden;
    border: 1px solid rgba(198,161,82,0.15);
    cursor:pointer;
    transition: transform .12s ease;
    animation: fadeInUp .35s ease both;
  }
  .video-card:active{ transform: scale(0.96); }
  .grid .video-card:nth-child(1){ animation-delay: .00s; }
  .grid .video-card:nth-child(2){ animation-delay: .03s; }
  .grid .video-card:nth-child(3){ animation-delay: .06s; }
  .grid .video-card:nth-child(4){ animation-delay: .09s; }
  .grid .video-card:nth-child(5){ animation-delay: .12s; }
  .grid .video-card:nth-child(6){ animation-delay: .15s; }
  .grid .video-card:nth-child(n+7){ animation-delay: .18s; }
  @keyframes fadeInUp{
    from{ opacity:0; transform: translateY(10px); }
    to{ opacity:1; transform: translateY(0); }
  }
  .thumb-wrap{
    position:relative;
    width:100%;
    aspect-ratio: 16/9;
    background:#000;
  }
  .thumb-wrap img{
    width:100%; height:100%; object-fit:cover; display:block;
  }
  .play-badge{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    background: rgba(0,0,0,0.15);
  }
  .play-badge svg{ width:24px; height:24px; }
  .video-info{ padding: 7px 8px 9px; }
  .video-title{
    font-size: 11px;
    font-weight:600;
    line-height:1.3;
    color: var(--text);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow:hidden;
  }
  .video-channel{
    font-size: 9.5px;
    color: var(--gold-light);
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .empty-state{
    text-align:center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }

  /* ---------- Player modal ---------- */
  .modal{
    position:fixed; inset:0;
    background: rgba(0,0,0,0.92);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index: 999;
    padding: 16px;
    opacity:0;
    pointer-events:none;
    transition: opacity .2s ease;
  }
  .modal.open{ opacity:1; pointer-events:auto; }
  .modal-content{
    width:100%;
    max-width: 520px;
    max-height: 92vh;
    overflow-y: auto;
    transform: scale(0.94);
    transition: transform .2s ease;
    position: relative;
    padding-top: 6px;
  }
  .modal.open .modal-content{ transform: scale(1); }
  .modal-close-x{
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(14,12,10,0.85);
    border: 1px solid var(--gold);
    color: var(--gold-light);
    width: 30px;
    height: 30px;
    border-radius: 50%;
    font-size: 15px;
    line-height: 1;
    z-index: 5;
  }
  .player-frame{
    position:relative;
    width:100%;
    aspect-ratio: 16/9;
    border-radius: 10px;
    overflow:hidden;
    border: 1px solid rgba(198,161,82,0.4);
  }
  .player-frame iframe{
    width:100%; height:100%; border:0;
  }
  .modal-title{
    color: var(--text);
    font-size: 15px;
    font-weight:600;
    margin-top: 14px;
    text-align:center;
  }

  /* ---------- Description & comments ---------- */
  .video-meta{
    font-size: 11.5px;
    color: var(--text-dim);
    text-align:center;
    margin-top: 4px;
  }
  .desc-box{
    background: var(--card);
    border: 1px solid rgba(198,161,82,0.15);
    border-radius: 10px;
    padding: 12px 14px;
    margin-top: 14px;
    font-size: 12.5px;
    color: var(--text);
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .desc-box.collapsed{
    max-height: 62px;
    overflow: hidden;
    position: relative;
  }
  .desc-toggle{
    display:block;
    margin-top: 8px;
    background: none;
    border: none;
    color: var(--gold-light);
    font-size: 11.5px;
    font-weight: 700;
    padding: 0;
  }
  .comments-section{ margin-top: 18px; }
  .comments-title{
    font-size: 13px;
    font-weight: 700;
    color: var(--gold-light);
    margin-bottom: 10px;
  }
  .comment-row{
    display:flex;
    gap: 10px;
    margin-bottom: 14px;
  }
  .comment-row img{
    width: 30px; height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--card);
  }
  .comment-body{ flex:1; min-width:0; }
  .comment-author{
    font-size: 11.5px;
    font-weight: 700;
    color: var(--text);
  }
  .comment-text{
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.5;
    margin-top: 2px;
    word-break: break-word;
  }
  .comment-likes{
    font-size: 10.5px;
    color: var(--text-dim);
    margin-top: 3px;
  }
  .comments-empty{
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    padding: 10px 0;
  }
  .meta-loading{
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    padding: 14px 0;
  }
  .queue-info{
    color: var(--text-dim);
    font-size: 11.5px;
    text-align:center;
    margin-top: 5px;
  }
  .queue-info b{ color: var(--gold-light); }
  .queue-controls{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-top: 14px;
  }
  .queue-nav-btn{
    display:flex;
    align-items:center;
    gap:6px;
    background: rgba(198,161,82,0.1);
    border: 1px solid rgba(198,161,82,0.4);
    color: var(--gold-light);
    padding: 9px 18px;
    border-radius: 20px;
    font-family:'Assistant', sans-serif;
    font-weight:600;
    font-size: 13px;
    transition: transform .12s ease, background .12s ease;
  }
  .queue-nav-btn:active{ transform: scale(0.94); background: rgba(198,161,82,0.25); }
  .queue-nav-btn svg{ width:16px; height:16px; }
  .modal-close{
    display:block;
    margin: 18px auto 0;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold-light);
    padding: 9px 26px;
    border-radius: 20px;
    font-family:'Assistant', sans-serif;
    font-weight:600;
    font-size: 13.5px;
  }

  /* ---------- Request content button + modal ---------- */
  .fab-request{
    position:fixed;
    bottom: 22px;
    left: 18px;
    background: var(--gold);
    color: var(--black);
    border:none;
    border-radius: 24px;
    padding: 12px 18px;
    font-family:'Assistant', sans-serif;
    font-weight:700;
    font-size: 13px;
    display:flex;
    align-items:center;
    gap:7px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.5);
    z-index: 500;
    transition: transform .15s ease;
  }
  .fab-request:active{ transform: scale(0.94); }
  .fab-request svg{ width:16px; height:16px; }

  .request-modal{
    position:fixed; inset:0;
    background: rgba(0,0,0,0.85);
    display:flex;
    align-items:flex-end;
    justify-content:center;
    z-index: 998;
    opacity:0;
    pointer-events:none;
    transition: opacity .25s ease;
  }
  .request-modal.open{ opacity:1; pointer-events:auto; }
  .request-sheet{
    width:100%;
    max-width: 460px;
    background: var(--black-soft);
    border-top: 1px solid rgba(198,161,82,0.4);
    border-radius: 18px 18px 0 0;
    padding: 22px 20px 26px;
    transform: translateY(30px);
    transition: transform .25s ease;
  }
  .request-modal.open .request-sheet{ transform: translateY(0); }
  .request-sheet h3{
    font-family:'Playfair Display', serif;
    color: var(--gold-light);
    font-size: 17px;
    margin-bottom: 14px;
    text-align:center;
  }
  .request-sheet input, .request-sheet select{
    width:100%;
    padding: 11px 14px;
    border-radius: 10px;
    border: 1px solid rgba(198,161,82,0.3);
    background: var(--card);
    color: var(--text);
    font-family:'Assistant', sans-serif;
    font-size: 14px;
    margin-bottom: 10px;
  }
  .request-sheet .req-btn-row{
    display:flex;
    gap:10px;
    margin-top:6px;
  }
  .request-sheet button.submit-btn{
    flex:1;
    background: var(--gold);
    color: var(--black);
    border:none;
    padding: 12px;
    border-radius: 10px;
    font-weight:700;
    font-size:14px;
  }
  .request-sheet button.cancel-btn{
    flex:1;
    background: transparent;
    border: 1px solid rgba(198,161,82,0.4);
    color: var(--text-dim);
    padding: 12px;
    border-radius: 10px;
    font-weight:600;
    font-size:14px;
  }
  .request-msg{
    font-size: 12.5px;
    text-align:center;
    margin-bottom: 10px;
    min-height: 16px;
  }
  .request-msg.error{ color: var(--gold-light); }
  .request-msg.success{ color: #6FA37A; }

  .loading{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 13.5px;
  }
  .spinner{
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 2.5px solid rgba(198,161,82,0.25);
    border-top-color: var(--gold);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin{
    to{ transform: rotate(360deg); }
  }

  /* שלד טעינה (skeleton) לכרטיסי וידאו - מוצג בזמן שהתוכן עדיין נטען */
  .skeleton-grid{
    display:grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    padding: 4px 14px 20px;
  }
  .skeleton-card{
    background: var(--card);
    border-radius: 12px;
    overflow:hidden;
    border: 1px solid rgba(198,161,82,0.15);
  }
  .skeleton-thumb{
    width:100%;
    aspect-ratio: 16/9;
    background: linear-gradient(90deg, #1C1812 25%, #241f18 37%, #1C1812 63%);
    background-size: 400% 100%;
    animation: shimmer 1.4s ease infinite;
  }
  .skeleton-line{
    height: 10px;
    margin: 12px;
    border-radius: 4px;
    background: linear-gradient(90deg, #1C1812 25%, #241f18 37%, #1C1812 63%);
    background-size: 400% 100%;
    animation: shimmer 1.4s ease infinite;
  }
  .skeleton-line.short{ width: 50%; }
  @keyframes shimmer{
    0%{ background-position: 100% 50%; }
    100%{ background-position: 0% 50%; }
  }
  /* ---------- רשת ביטחון: משוב לחיצה מיידי לכל אלמנט לחיץ, גם אם לא הוגדר לו סגנון ספציפי ---------- */
  button, [onclick]{
    transition: transform .1s ease, opacity .1s ease;
  }
  button:active, [onclick]:active{
    opacity: 0.75;
  }
</style>
</head>

<header>
  <div class="logo-ring">
    <svg viewBox="0 0 24 24" fill="#E6C682"><path d="M9 18V5l12-2v13" stroke="#E6C682" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/><circle cx="6" cy="18" r="3" fill="#E6C682"/><circle cx="18" cy="16" r="3" fill="#E6C682"/></svg>
  </div>
  <h1>Sol Music</h1>
</header>

<div class="search-wrap">
  <div class="search-box">
    <svg viewBox="0 0 24 24" fill="none" stroke="#9C9184" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="חיפוש שיר, ניגון או אמן...">

</div>

<div class="premium-banner" id="premiumBanner" onclick="goToYouTubePremium()">

  <div class="txt">
    <div class="t1">לצפייה ללא פרסומות</div>
    <div class="t2">הירשם כאן ל-YouTube Premium</div>
  </div>
</div>

<!-- First-launch YouTube Premium intro -->
<div class="premium-intro-modal" id="premiumIntroModal">
  <div class="premium-intro-card">
    <svg class="yt-icon-big" viewBox="0 0 48 48"><rect width="48" height="48" rx="12" fill="#FF0000"/><path d="M19 15L34 24L19 33V15Z" fill="white"/></svg>
    <h3>רוצים לצפות ללא פרסומות?</h3>
    <p>ברוכים הבאים ל-Sol Music! אפשר ליהנות מכל הצפייה בלי הפרעות פרסומת דרך מנוי YouTube Premium.</p>
    <div class="btn-row">
      <button class="btn-primary" onclick="goToYouTubePremium(); closePremiumIntro();">מעבר ל-YouTube Premium</button>
      <button class="btn-skip" onclick="closePremiumIntro()">אולי מאוחר יותר</button>
    </div>
  </div>
</div>

<div class="top-cats" id="topCats"></div>
<div class="current-filter-label" id="currentFilterLabel"></div>

<!-- Subcategory selection panel -->
<div class="subcat-modal" id="subcatModal" onclick="closeSubcatPanel()">
  <div class="subcat-sheet" onclick="event.stopPropagation()">
    <h3 id="subcatTitle"></h3>
    <div id="subcatList"></div>
  </div>
</div>

<div id="content">
  <div class="loading"><div class="spinner"></div>טוען תוכן...</div>
</div>

<!-- Request Content Button -->
<button class="fab-request" onclick="openRequestModal()">
  <svg viewBox="0 0 24 24" fill="none" stroke="#0E0C0A" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>
  בקשת תוכן
</button>

<!-- Playlists Button -->
<button class="fab-playlists" onclick="openPlaylistsModal()">
  <svg viewBox="0 0 24 24" fill="none" stroke="#E6C682" stroke-width="2.2"><path d="M4 6h16M4 12h10M4 18h10"/><circle cx="18" cy="18" r="2.4"/></svg>
  הפלייליסטים שלי
</button>

<!-- Request Content Modal -->
<div class="request-modal" id="requestModal">
  <div class="request-sheet">
    <h3>בקשת אישור לתוכן חדש</h3>
    <div class="request-msg" id="requestMsg"></div>
    <input type="text" id="requestUrlInput" placeholder="הדביקי כאן קישור לסרטון YouTube">
    <select id="requestCategorySelect"></select>
    <div class="req-btn-row">
      <button class="cancel-btn" onclick="closeRequestModal()">ביטול</button>
      <button class="submit-btn" onclick="submitRequest()">שליחת בקשה</button>

<!-- Playlists List Modal (main view: all playlists, or one playlist's videos) -->
<div class="playlists-modal" id="playlistsModal">
  <div class="playlists-sheet">
    <h3 id="playlistsTitle">הפלייליסטים שלי</h3>
    <div id="playlistsBody"></div>
    <div class="new-playlist-row" id="newPlaylistRow">
      <input type="text" id="newPlaylistNameInput" placeholder="שם פלייליסט חדש...">
      <button onclick="createPlaylist()">צור</button>

    <button class="modal-close secondary" onclick="closePlaylistsModal()">סגירה</button>

</div>

<!-- Quick "Add to playlist" Modal -->

      <input type="text" id="quickNewPlaylistName" placeholder="או צרי פלייליסט חדש...">

<!-- Player Modal -->
<div class="modal" id="playerModal">
  <div class="modal-content">
    <button class="modal-close-x" onclick="closePlayer()">✕</button>
    <div class="player-frame" id="playerFrame"></div>

      <button class="queue-nav-btn" onclick="playPrevious()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 20L9 12l10-8v16z"/><path d="M5 19V5"/></svg>
        הקודם
      </button>
      <button class="queue-nav-btn" onclick="playNext()">
        הבא
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 4l10 8-10 8V4z"/><path d="M19 5v14"/></svg>
      </button>

    <div id="videoDetailsArea"><div class="meta-loading">טוען תיאור ותגובות...</div></div>

</div>

<script>
  // ========================================================
  // הגדרה - יש להחליף בכתובת ה-Apps Script שלך אחרי הפריסה
  // ========================================================
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzy0Hc0BiO_mq1niFnYrSztYEYqEnVZXIA6cNCYwwtJP1RujuKIMXcWq5frjKRDdkHr/exec';

  const topCatsEl = document.getElementById('topCats');
  const filterLabelEl = document.getElementById('currentFilterLabel');
  const contentEl = document.getElementById('content');
  let currentCategory = 'all';
  let categoryTree = [];

  // מטמון בזיכרון - שומר תוצאות של קטגוריות שכבר נטענו, כדי שמעבר חוזר יהיה מיידי
  const videoCache = {};
  // כמה זמן (במילישניות) לפני שמטמון נחשב "ישן" ומתעדכן שוב ברקע - 5 דקות
  const CACHE_TTL = 5 * 60 * 1000;

  async function loadCategories(){
    try{
      const res = await fetch(`${APPS_SCRIPT_URL}?action=categoryTree`);
      categoryTree = await res.json();
      renderTopCategories();
      prefetchAllCategoriesInBackground();
    }catch(err){
      console.warn('שגיאה בטעינת קטגוריות', err);
    }
  }

  // טוענים ברקע, בשקט, את תוכן כל הקטגוריות (עד לעלים) - כדי שכשהמשתמש בפועל
  // ילחץ על קטגוריה, התוכן כבר יחכה לו במטמון ויורגש מיידי, בלי המתנה לרשת.
  // רץ ברצף אחד-אחד (לא כולם בבת אחת) כדי לא להציף את השרת בבקשות מקבילות.
  async function prefetchAllCategoriesInBackground(){
    const leafNames = [];
    function collectLeaves(nodes){
      nodes.forEach(node => {
        if (!node.children || !node.children.length) leafNames.push(node.name);
        else collectLeaves(node.children);
      });
    }
    collectLeaves(categoryTree);

    for (const name of leafNames){
      if (videoCache[name]) continue; // כבר במטמון, אין טעם לשלוף שוב
      try{ await fetchAndCache(name, true); }catch(e){ /* לא קריטי, ממשיכים הלאה */ }
    }
  }

  function renderTopCategories(){
    topCatsEl.innerHTML = '';

    const allBtn = document.createElement('button');
    allBtn.className = 'top-cat-btn active';
    allBtn.innerHTML = `<div class="top-cat-circle">הכל</div><div class="top-cat-label">הכל</div>`;
    allBtn.onclick = () => selectAllContent(allBtn);
    topCatsEl.appendChild(allBtn);

    categoryTree.forEach(node => {
      const btn = document.createElement('button');
      btn.className = 'top-cat-btn';
      const initial = node.name ? node.name.charAt(0) : '?';
      btn.innerHTML = `<div class="top-cat-circle">${escapeHtml(initial)}</div><div class="top-cat-label">${escapeHtml(node.name)}</div>`;
      btn.onclick = () => onTopCategoryClick(node, btn);
      topCatsEl.appendChild(btn);
    });
  }

  function setActiveTopBtn(activeBtn){
    document.querySelectorAll('.top-cat-btn').forEach(b => b.classList.remove('active'));
    activeBtn.classList.add('active');
  }

  function selectAllContent(btnEl){
    setActiveTopBtn(btnEl);
    currentCategory = 'all';
    filterLabelEl.innerHTML = '';
    loadVideos('all');
  }

  function onTopCategoryClick(node, btnEl){
    setActiveTopBtn(btnEl);
    if (!node.children || node.children.length === 0){
      currentCategory = node.name;
      filterLabelEl.innerHTML = `מציגה: <b>${escapeHtml(node.name)}</b>`;
      loadVideos(node.name);
      return;
    }
    positionSubcatPanel(btnEl);
    openSubcatPanel(node, [node.name]);
  }

  // ממקמים את החלונית ממש ליד האייקון שנלחץ (לא כחלונית תחתונה שתופסת את המסך) -
  // מחשבים לפי מיקום האייקון בפועל, ומוודאים שהיא לא "בורחת" מחוץ למסך
  function positionSubcatPanel(anchorEl){
    const rect = anchorEl.getBoundingClientRect();
    const sheet = document.querySelector('.subcat-sheet');
    const panelWidth = 220;
    let left = rect.left + rect.width/2 - panelWidth/2;
    left = Math.max(10, Math.min(left, window.innerWidth - panelWidth - 10));
    const top = rect.bottom + 8;
    sheet.style.left = left + 'px';
    sheet.style.top = top + 'px';
  }

  // חלונית תתי-קטגוריות שתומכת בעומק בלתי מוגבל - כל לחיצה על צומת שיש לו
  // עוד ילדים "נכנסת פנימה" לרמה הבאה, עם כפתור חזרה, עד שמגיעים לעלה סופי
  function openSubcatPanel(node, pathLabels){
    document.getElementById('subcatTitle').textContent = formatPathForDisplay(pathLabels).join(' · ');
    const listEl = document.getElementById('subcatList');
    listEl.innerHTML = '';

    if (pathLabels.length > 1){
      const backItem = document.createElement('button');
      backItem.className = 'subcat-item';
      backItem.style.color = '#9C9184';
      backItem.textContent = '→ חזרה';
      backItem.onclick = () => {
        const parentPath = pathLabels.slice(0, -1);
        const parentNode = findNodeByPath(categoryTree, parentPath);
        if (parentNode) openSubcatPanel(parentNode, parentPath);
      };
      listEl.appendChild(backItem);
    }

    const allItem = document.createElement('button');
    allItem.className = 'subcat-item all-item';
    allItem.textContent = `כל ${node.name}`;
    allItem.onclick = () => selectSubcategory(node.name, pathLabels);
    listEl.appendChild(allItem);

    node.children.forEach(child => {
      const item = document.createElement('button');
      item.className = 'subcat-item';
      item.textContent = displayLabel(child.name, node.name);
      item.onclick = () => {
        const newPath = pathLabels.concat([child.name]);
        if (child.children && child.children.length){
          openSubcatPanel(child, newPath);
        } else {
          selectSubcategory(child.name, newPath);
        }
      };
      listEl.appendChild(item);
    });

    document.getElementById('subcatModal').classList.add('open');
  }

  // מוצא צומת בעץ לפי מסלול שמות (לצורך כפתור "חזרה" בתוך החלונית)
  // מציג "שיר מלא" במקום "מוטי וייס · שיר מלא" בתפריט - השם המלא עדיין
  // משמש מאחורי הקלעים לסינון (כדי שלא יתערבב בין זמרים), רק התצוגה מתקצרת
  function displayLabel(name, parentName){
    const prefix = parentName + ' · ';
    return name.indexOf(prefix) === 0 ? name.slice(prefix.length) : name;
  }

  // מנקה מסלול ניווט שלם (מערך שמות) לתצוגה - כל שלב מתנקה יחסית לשלב שלפניו
  function formatPathForDisplay(path){
    return path.map((name, i) => i === 0 ? name : displayLabel(name, path[i - 1]));
  }

  function findNodeByPath(nodes, path){
    if (!path.length) return null;
    let current = nodes.find(n => n.name === path[0]);
    for (let i = 1; i < path.length && current; i++){
      current = current.children.find(n => n.name === path[i]);
    }
    return current;
  }

  function closeSubcatPanel(){
    document.getElementById('subcatModal').classList.remove('open');
  }

  function selectSubcategory(categoryName, pathLabels){
    currentCategory = categoryName;
    filterLabelEl.innerHTML = `מציגה: <b>${escapeHtml(formatPathForDisplay(pathLabels).join(' · '))}</b>`;
    loadVideos(categoryName);
    closeSubcatPanel();
  }

  async function loadVideos(category){
    const cached = videoCache[category];
    const now = Date.now();

    // אם יש מטמון לקטגוריה הזו - מציגים אותו מיד, בלי המתנה לשרת
    if (cached) {
      renderVideos(cached.videos);
      // אם המטמון ישן - מרעננים ברקע בלי לחסום את התצוגה
      if (now - cached.timestamp > CACHE_TTL) {
        fetchAndCache(category, true);
      }
      return;
    }

    // אין מטמון בכלל - זו הפעם הראשונה שמבקרים בקטגוריה הזו, מציגים שלד טעינה
    showSkeleton();
    await fetchAndCache(category, false);
  }

  function showSkeleton(){
    const grid = document.createElement('div');
    grid.className = 'skeleton-grid';
    for(let i = 0; i < 6; i++){
      const card = document.createElement('div');
      card.className = 'skeleton-card';
      card.innerHTML = `
        <div class="skeleton-thumb"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line short"></div>
      `;
      grid.appendChild(card);
    }
    contentEl.innerHTML = '';
    contentEl.appendChild(grid);
  }

  async function fetchAndCache(category, isBackgroundRefresh){
    try{
      const url = `${APPS_SCRIPT_URL}?action=videos&category=${encodeURIComponent(category)}`;
      const res = await fetch(url);
      const videos = await res.json();

      videoCache[category] = { videos, timestamp: Date.now() };

      // בעדכון רקע: מציגים את התוצאה החדשה רק אם המשתמש עדיין נמצא באותה קטגוריה
      if (!isBackgroundRefresh || currentCategory === category) {
        renderVideos(videos);
      }
    }catch(err){
      if (!isBackgroundRefresh) {
        contentEl.innerHTML = '<div class="empty-state">שגיאה בטעינת התוכן. נסי לרענן.</div>';
      }
      console.warn(err);
    }
  }

  let currentPool = []; // הרשימה הנוכחית שמוצגת (לתצוגה בלבד)
  let fullLibraryCache = null;
  let fullLibraryCacheTime = 0;
  const LIBRARY_CACHE_TTL = 5 * 60 * 1000; // 5 דקות

  // כל הספרייה המאושרת של האפליקציה - זה המאגר שממנו בונים את ההשמעה האקראית,
  // לא רק מה שמוצג כרגע על המסך
  async function getFullLibrary(){
    const now = Date.now();
    if (fullLibraryCache && (now - fullLibraryCacheTime < LIBRARY_CACHE_TTL)){
      return fullLibraryCache;
    }
    try{
      const res = await fetch(`${APPS_SCRIPT_URL}?action=videos&category=all`);
      const videos = await res.json();
      fullLibraryCache = videos;
      fullLibraryCacheTime = now;
      return videos;
    }catch(err){
      return fullLibraryCache || [];
    }
  }

  function renderVideos(videos){
    currentPool = videos;
    if(!videos.length){
      contentEl.innerHTML = '<div class="empty-state">אין עדיין תוכן בקטגוריה הזו</div>';
      return;
    }
    const grid = document.createElement('div');
    grid.className = 'grid';
    videos.forEach((v, i) => grid.appendChild(buildCard(v, i)));
    contentEl.innerHTML = '';
    contentEl.appendChild(grid);
  }

  function buildCard(v, index){
    const card = document.createElement('div');
    card.className = 'video-card';
    card.innerHTML = `
      <div class="thumb-wrap">
        <img src="${v.Thumbnail}" alt="${escapeHtml(v.Title)}" loading="lazy">
        <div class="play-badge">
          <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" fill="rgba(0,0,0,0.55)" stroke="#E6C682" stroke-width="1.2"/><path d="M10 8.5L16 12L10 15.5V8.5Z" fill="#E6C682"/></svg>
        </div>
        <button class="add-playlist-btn" onclick="event.stopPropagation(); openAddToPlaylist('${v.VideoID}', '${escapeAttr(v.Title)}', '${escapeAttr(v.Thumbnail)}', '${escapeAttr(v.ChannelName)}')">+</button>
      </div>
      <div class="video-info">
        <div class="video-title">${escapeHtml(v.Title)}</div>
        <div class="video-channel">${escapeHtml(v.ChannelName)}</div>
      </div>
    `;
    card.onclick = () => startQueueFromLibrary(v);
    return card;
  }

  function escapeAttr(str){
    return (str || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  // ========================================================
  // נגן חכם - משמיע שיר אחרי שיר מתוך המאגר הדומה (אותה קטגוריה/תוצאות),
  // בסדר אקראי, ללא אפשרות דילוג קדימה/אחורה, ושומר היסטוריית האזנה
  // ========================================================
  let ytPlayer = null;
  let ytApiReady = false;
  let ytReadyQueue = [];
  let currentQueue = [];
  let currentQueueIndex = 0;
  let seekLockInterval = null;
  let expectedTime = 0;

  // טוענים את YouTube IFrame API באופן דינמי
  (function loadYouTubeAPI(){
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
  })();

  window.onYouTubeIframeAPIReady = function(){
    ytApiReady = true;
    ytReadyQueue.forEach(fn => fn());
    ytReadyQueue = [];
  };

  function whenYTReady(fn){
    if (ytApiReady) fn();
    else ytReadyQueue.push(fn);
  }

  // מערבבים מערך (Fisher-Yates) - זה נותן את "הסדר האקראי" שביקשת
  function shuffleArray(arr){
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // בונים תור השמעה: השיר שנלחץ קודם, ואז מגוון אקראי מתוך *כל* הספרייה המאושרת
  // של האפליקציה (לא רק מה שמוצג כרגע על המסך) - זה ה"רדיו" האקראי שביקשת
  async function startQueueFromLibrary(clickedVideo){
    currentQueue = [clickedVideo];
    currentQueueIndex = 0;
    playQueueItem(0);

    const library = await getFullLibrary();
    const rest = library.filter(v => v.VideoID !== clickedVideo.VideoID);
    currentQueue = [clickedVideo, ...shuffleArray(rest)];
    // אם המשתמש עדיין באותו שיר (עוד לא עבר הלאה) - רק מרעננים את תווית "הבא בתור"
    if (currentQueueIndex === 0) updateQueueInfoLabel();
  }

  function playQueueItem(index){
    if (!currentQueue.length) return;
    // הגענו לסוף התור - מערבבים מחדש ומתחילים סבב חדש, כדי שההשמעה תישאר רציפה ולא תיעצר
    if (index >= currentQueue.length){
      currentQueue = shuffleArray(currentQueue);
      index = 0;
    }
    // "הקודם" מתחילת התור - פשוט קופצים לסוף התור הנוכחי
    if (index < 0){
      index = currentQueue.length - 1;
    }
    currentQueueIndex = index;
    const video = currentQueue[index];
    loadVideoInPlayer(video.VideoID, video.Title);
    addToHistory(video);
    updateQueueInfoLabel();
  }

  function playNext(){
    playQueueItem(currentQueueIndex + 1);
  }

  function playPrevious(){
    playQueueItem(currentQueueIndex - 1);
  }

  function updateQueueInfoLabel(){
    const el = document.getElementById('queueInfo');
    const upcoming = currentQueue[currentQueueIndex + 1];
    el.innerHTML = upcoming
      ? `מתנגן בסדר אקראי · הבא בתור: <b>${escapeHtml(upcoming.Title)}</b>`
      : 'מתנגן בסדר אקראי';
  }

  function loadVideoInPlayer(videoId, title){
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('playerModal').classList.add('open');
    loadVideoDetails(videoId);

    whenYTReady(() => {
      if (!ytPlayer){
        ytPlayer = new YT.Player('playerFrame', {
          videoId: videoId,
          playerVars: { autoplay: 1, rel: 0, modestbranding: 1, mute: 1 },
          events: {
            onReady: (e) => { e.target.playVideo(); e.target.unMute(); startSeekLock(); },
            onStateChange: onPlayerStateChange
          }
        });
      } else {
        ytPlayer.loadVideoById(videoId);
        ytPlayer.playVideo();
        ytPlayer.unMute();
        startSeekLock();
      }
    });
  }

  // ========================================================
  // תיאור + תגובות - בדיוק כמו בדף של יוטיוב עצמו. נשלף רק כשבאמת
  // פותחים סרטון לצפייה (לא תוך כדי דפדוף ברשימות)
  // ========================================================
  let detailsRequestToken = 0; // מונע מצב שתשובה איטית "תדרוס" תוכן של סרטון חדש יותר
  let currentVideoIdForComments = null;
  let currentCommentsPageToken = '';

  async function loadVideoDetails(videoId){
    const myToken = ++detailsRequestToken;
    currentVideoIdForComments = videoId;
    currentCommentsPageToken = '';
    const area = document.getElementById('videoDetailsArea');
    document.getElementById('videoMeta').textContent = '';
    area.innerHTML = '<div class="meta-loading">טוען תיאור ותגובות...</div>';

    try{
      const res = await fetch(`${APPS_SCRIPT_URL}?action=videoDetails&videoId=${encodeURIComponent(videoId)}`);
      const data = await res.json();
      if (myToken !== detailsRequestToken) return; // המשתמש כבר עבר לסרטון אחר

      currentCommentsPageToken = data.nextPageToken || '';
      renderVideoMeta(data);
      renderVideoDescription(data.description);
      renderVideoComments(data, false);
    }catch(err){
      if (myToken !== detailsRequestToken) return;
      area.innerHTML = '';
    }
  }

  async function loadMoreComments(){
    if (!currentCommentsPageToken || !currentVideoIdForComments) return;
    const myToken = detailsRequestToken;
    const btn = document.getElementById('loadMoreCommentsBtn');
    if (btn) btn.textContent = 'טוען...';

    try{
      const url = `${APPS_SCRIPT_URL}?action=videoDetails&videoId=${encodeURIComponent(currentVideoIdForComments)}&pageToken=${encodeURIComponent(currentCommentsPageToken)}`;
      const res = await fetch(url);
      const data = await res.json();
      if (myToken !== detailsRequestToken) return;

      currentCommentsPageToken = data.nextPageToken || '';
      appendVideoComments(data.comments || []);
      updateLoadMoreButton();
    }catch(err){
      if (btn) btn.textContent = 'טען עוד תגובות';
    }
  }

  function renderVideoMeta(data){
    const parts = [];
    if (data.viewCount) parts.push(`${formatCount(data.viewCount)} צפיות`);
    if (data.likeCount) parts.push(`👍 ${formatCount(data.likeCount)}`);
    document.getElementById('videoMeta').textContent = parts.join(' · ');
  }

  function formatCount(n){
    n = parseInt(n, 10);
    if (isNaN(n)) return '';
    if (n >= 1000000) return (n/1000000).toFixed(1).replace(/\.0$/,'') + 'M';
    if (n >= 1000) return (n/1000).toFixed(1).replace(/\.0$/,'') + 'K';
    return String(n);
  }

  function renderVideoDescription(description){
    const area = document.getElementById('videoDetailsArea');
    area.innerHTML = '';
    if (!description){
      return; // אין תיאור - לא מציגים תיבה ריקה
    }
    const box = document.createElement('div');
    box.className = 'desc-box collapsed';
    box.id = 'descBox';
    box.textContent = description;
    area.appendChild(box);

    const toggle = document.createElement('button');
    toggle.className = 'desc-toggle';
    toggle.textContent = 'הצג עוד';
    toggle.onclick = () => {
      const isCollapsed = box.classList.toggle('collapsed');
      toggle.textContent = isCollapsed ? 'הצג עוד' : 'הצג פחות';
    };
    area.appendChild(toggle);
  }

  function renderVideoComments(data, appendOnly){
    const area = document.getElementById('videoDetailsArea');
    const section = document.createElement('div');
    section.className = 'comments-section';
    section.id = 'commentsSection';

    const title = document.createElement('div');
    title.className = 'comments-title';
    title.textContent = 'תגובות';
    section.appendChild(title);

    const list = document.createElement('div');
    list.id = 'commentsList';
    section.appendChild(list);

    if (data.commentsDisabled){
      const empty = document.createElement('div');
      empty.className = 'comments-empty';
      empty.textContent = 'התגובות מושבתות לסרטון הזה';
      list.appendChild(empty);
    } else if (!data.comments || !data.comments.length){
      const empty = document.createElement('div');
      empty.className = 'comments-empty';
      empty.textContent = 'אין עדיין תגובות';
      list.appendChild(empty);
    }

    const loadMoreBtn = document.createElement('button');
    loadMoreBtn.id = 'loadMoreCommentsBtn';
    loadMoreBtn.className = 'desc-toggle';
    loadMoreBtn.textContent = 'טען עוד תגובות';
    loadMoreBtn.onclick = loadMoreComments;
    loadMoreBtn.style.display = 'none';
    section.appendChild(loadMoreBtn);

    area.appendChild(section);

    if (data.comments && data.comments.length) appendVideoComments(data.comments);
    updateLoadMoreButton();
  }

  function appendVideoComments(comments){
    const list = document.getElementById('commentsList');
    if (!list) return;
    comments.forEach(c => {
      const row = document.createElement('div');
      row.className = 'comment-row';
      row.innerHTML = `
        <img src="${c.authorImage}" alt="">
        <div class="comment-body">
          <div class="comment-author">${escapeHtml(c.author)}</div>
          <div class="comment-text">${c.text}</div>
          <div class="comment-likes">👍 ${formatCount(c.likeCount)}</div>
        </div>
      `;
      list.appendChild(row);
    });
  }

  function updateLoadMoreButton(){
    const btn = document.getElementById('loadMoreCommentsBtn');
    if (!btn) return;
    if (currentCommentsPageToken){
      btn.style.display = 'block';
      btn.textContent = 'טען עוד תגובות';
    } else {
      btn.style.display = 'none';
    }
  }

  function onPlayerStateChange(event){
    if (event.data === YT.PlayerState.ENDED){
      // השיר נגמר - עוברים אוטומטית לבא בתור (שיר אחרי שיר, בלי מגע יד)
      playQueueItem(currentQueueIndex + 1);
    }
  }

  // מניעת דילוג קדימה/אחורה: עוקבים אחרי הזמן בפועל, ואם מישהו גורר את
  // פס ההתקדמות (קפיצה גדולה בזמן) - "מחזירים" את הנגן לזמן הצפוי
  function startSeekLock(){
    stopSeekLock();
    expectedTime = 0;
    seekLockInterval = setInterval(() => {
      if (!ytPlayer || typeof ytPlayer.getCurrentTime !== 'function') return;
      const current = ytPlayer.getCurrentTime();
      const diff = current - expectedTime;
      // הפרש סביר של כשנייה נחשב התקדמות טבעית של הניגון; קפיצה גדולה יותר = ניסיון דילוג
      if (diff > 2.5 || diff < -1.5){
        ytPlayer.seekTo(expectedTime, true);
      } else {
        expectedTime = current;
      }
    }, 1000);
  }

  function stopSeekLock(){
    if (seekLockInterval) clearInterval(seekLockInterval);
    seekLockInterval = null;
  }

  function closePlayer(){
    stopSeekLock();
    if (ytPlayer && typeof ytPlayer.pauseVideo === 'function') ytPlayer.pauseVideo();
    document.getElementById('playerModal').classList.remove('open');
  }

  // ---------- היסטוריית האזנה - נשמרת בטלפון של המשתמש, כמו הפלייליסטים ----------
  const HISTORY_KEY = 'solmusic_history_v1';
  const HISTORY_MAX = 100;

  function addToHistory(video){
    let history = [];
    try{ history = JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }catch(e){}
    history.unshift({ ...video, playedAt: Date.now() });
    if (history.length > HISTORY_MAX) history = history.slice(0, HISTORY_MAX);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  }

  function getHistory(){
    try{ return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }catch(e){ return []; }
  }

  function clearHistory(){
    localStorage.removeItem(HISTORY_KEY);
    renderHistoryView();
  }

  function openHistoryView(){
    document.getElementById('playlistsModal').classList.add('open');
    renderHistoryView();
  }

  function renderHistoryView(){
    document.getElementById('playlistsTitle').innerHTML =
      `<button onclick="renderPlaylistsHome()" style="background:none;border:none;color:var(--gold-light);font-size:14px;margin-left:8px;">→</button>היסטוריית האזנה`;
    document.getElementById('newPlaylistRow').style.display = 'none';

    const history = getHistory();
    const body = document.getElementById('playlistsBody');

    if (!history.length){
      body.innerHTML = '<div class="empty-inline">עדיין לא האזנת לשום דבר</div>';
      return;
    }

    body.innerHTML = '';
    history.forEach(v => {
      const row = document.createElement('div');
      row.className = 'playlist-row';
      row.innerHTML = `
        <div style="flex:1; display:flex; align-items:center; gap:10px;">
          <img src="${v.Thumbnail}" style="width:52px; height:32px; object-fit:cover; border-radius:5px;">
          <div>
            <div class="pl-name" style="font-size:12.5px;">${escapeHtml(v.Title)}</div>
            <div class="pl-count">${escapeHtml(v.ChannelName)}</div>
          </div>
        </div>
      `;
      row.querySelector('div').onclick = () => {
        closePlaylistsModal();
        startQueueFromLibrary(v);
      };
      body.appendChild(row);
    });

    const clearBtn = document.createElement('button');
    clearBtn.className = 'modal-close secondary';
    clearBtn.style.marginTop = '14px';
    clearBtn.textContent = 'נקה היסטוריה';
    clearBtn.onclick = clearHistory;
    body.appendChild(clearBtn);
  }

  // ========================================================
  // פלייליסטים - נשמרים בזיכרון הדפדפן של המשתמש (localStorage),
  // כי אין מערכת התחברות/משתמשים באתר. כל מבקר בונה פלייליסטים משלו,
  // שנשארים אצלו בין ביקורים באותו מכשיר/דפדפן.
  // ========================================================
  const PLAYLISTS_KEY = 'solmusic_playlists_v1';
  let pendingAddVideo = null; // הסרטון שממתין להוספה, בזמן שפתוח חלון "הוספה לפלייליסט"

  function getPlaylists(){
    try{
      const raw = localStorage.getItem(PLAYLISTS_KEY);
      return raw ? JSON.parse(raw) : {};
    }catch(err){ return {}; }
  }

  function savePlaylists(playlists){
    localStorage.setItem(PLAYLISTS_KEY, JSON.stringify(playlists));
  }

  function makePlaylistId(){
    return 'pl_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
  }

  // ---------- "הפלייליסטים שלי" - מסך ראשי ----------
  function openPlaylistsModal(){
    document.getElementById('playlistsModal').classList.add('open');
    renderPlaylistsHome();
  }

  function closePlaylistsModal(){
    document.getElementById('playlistsModal').classList.remove('open');
  }

  function renderPlaylistsHome(){
    document.getElementById('playlistsTitle').textContent = 'הפלייליסטים שלי';
    document.getElementById('newPlaylistRow').style.display = 'flex';
    const playlists = getPlaylists();
    const ids = Object.keys(playlists);
    const body = document.getElementById('playlistsBody');

    body.innerHTML = '';

    // כניסה קבועה להיסטוריית האזנה - תמיד למעלה
    const historyRow = document.createElement('div');
    historyRow.className = 'playlist-row';
    historyRow.style.borderColor = 'rgba(198,161,82,0.4)';
    historyRow.innerHTML = `
      <div style="flex:1;">
        <div class="pl-name">🕐 היסטוריית האזנה</div>
        <div class="pl-count">${getHistory().length} סרטונים שהושמעו</div>
      </div>
    `;
    historyRow.onclick = openHistoryView;
    body.appendChild(historyRow);

    if (!ids.length){
      const empty = document.createElement('div');
      empty.className = 'empty-inline';
      empty.textContent = 'עדיין לא יצרת פלייליסטים. לחצי על ה-+ בכל סרטון כדי להתחיל!';
      body.appendChild(empty);
      return;
    }

    ids.forEach(id => {
      const pl = playlists[id];
      const row = document.createElement('div');
      row.className = 'playlist-row';
      row.innerHTML = `
        <div onclick="openPlaylistView('${id}')" style="flex:1;">
          <div class="pl-name">${escapeHtml(pl.name)}</div>
          <div class="pl-count">${pl.videos.length} סרטונים</div>
        </div>
        <button class="pl-del" onclick="event.stopPropagation(); deletePlaylist('${id}')">✕</button>
      `;
      body.appendChild(row);
    });
  }

  function createPlaylist(){
    const input = document.getElementById('newPlaylistNameInput');
    const name = input.value.trim();
    if (!name) return;
    const playlists = getPlaylists();
    const id = makePlaylistId();
    playlists[id] = { name, videos: [] };
    savePlaylists(playlists);
    input.value = '';
    renderPlaylistsHome();
  }

  function deletePlaylist(id){
    const playlists = getPlaylists();
    delete playlists[id];
    savePlaylists(playlists);
    renderPlaylistsHome();
  }

  // ---------- צפייה בתוך פלייליסט ספציפי ----------
  function openPlaylistView(id){
    const playlists = getPlaylists();
    const pl = playlists[id];
    if (!pl) return;

    document.getElementById('playlistsTitle').innerHTML =
      `<button onclick="renderPlaylistsHome()" style="background:none;border:none;color:var(--gold-light);font-size:14px;margin-left:8px;">→</button>${escapeHtml(pl.name)}`;
    document.getElementById('newPlaylistRow').style.display = 'none';

    const body = document.getElementById('playlistsBody');
    if (!pl.videos.length){
      body.innerHTML = '<div class="empty-inline">הפלייליסט עדיין ריק</div>';
      return;
    }

    body.innerHTML = '';
    pl.videos.forEach(v => {
      const row = document.createElement('div');
      row.className = 'playlist-row';
      row.innerHTML = `
        <div style="flex:1; display:flex; align-items:center; gap:10px;">
          <img src="${v.Thumbnail}" style="width:52px; height:32px; object-fit:cover; border-radius:5px;">
          <div>
            <div class="pl-name" style="font-size:12.5px;">${escapeHtml(v.Title)}</div>
            <div class="pl-count">${escapeHtml(v.ChannelName)}</div>
          </div>
        </div>
        <button class="pl-del" onclick="event.stopPropagation(); removeFromPlaylist('${id}', '${v.VideoID}')">✕</button>
      `;
      row.querySelector('div').onclick = () => {
        closePlaylistsModal();
        startQueueFromLibrary(v);
      };
      body.appendChild(row);
    });
  }

  function removeFromPlaylist(playlistId, videoId){
    const playlists = getPlaylists();
    if (!playlists[playlistId]) return;
    playlists[playlistId].videos = playlists[playlistId].videos.filter(v => v.VideoID !== videoId);
    savePlaylists(playlists);
    openPlaylistView(playlistId);
  }

  // ---------- הוספה מהירה מכרטיס סרטון ----------
  function openAddToPlaylist(videoId, title, thumbnail, channelName){
    pendingAddVideo = { VideoID:videoId, Title:title, Thumbnail:thumbnail, ChannelName:channelName };
    const playlists = getPlaylists();
    const ids = Object.keys(playlists);
    const list = document.getElementById('quickAddList');

    if (!ids.length){
      list.innerHTML = '<div class="empty-inline">אין עדיין פלייליסטים - צרי אחד למטה</div>';
    } else {
      list.innerHTML = '';
      ids.forEach(id => {
        const pl = playlists[id];
        const already = pl.videos.some(v => v.VideoID === videoId);
        const btn = document.createElement('button');
        btn.className = 'subcat-item' + (already ? ' all-item' : '');
        btn.textContent = already ? `${pl.name} (כבר נמצא ✓)` : pl.name;
        btn.onclick = () => addPendingVideoToPlaylist(id);
        list.appendChild(btn);
      });
    }

    document.getElementById('quickAddModal').classList.add('open');
  }

  function closeQuickAddModal(){
    document.getElementById('quickAddModal').classList.remove('open');
    pendingAddVideo = null;
  }

  function addPendingVideoToPlaylist(playlistId){
    if (!pendingAddVideo) return;
    const playlists = getPlaylists();
    const pl = playlists[playlistId];
    if (!pl) return;
    if (!pl.videos.some(v => v.VideoID === pendingAddVideo.VideoID)){
      pl.videos.push(pendingAddVideo);
      savePlaylists(playlists);
    }
    closeQuickAddModal();
  }

  function quickCreateAndAdd(){
    const input = document.getElementById('quickNewPlaylistName');
    const name = input.value.trim();
    if (!name || !pendingAddVideo) return;
    const playlists = getPlaylists();
    const id = makePlaylistId();
    playlists[id] = { name, videos: [pendingAddVideo] };
    savePlaylists(playlists);
    input.value = '';
    closeQuickAddModal();
  }

  loadCategories();
  loadVideos('all');

  // ========================================================
  // YouTube Premium - קישור נוח בלבד, לא מנוי "דרך" האפליקציה בפועל.
  // ההרשמה והתשלום קורים אצל גוגל עצמם, אין לאתר הזה שום מעורבות בכסף.
  // ========================================================
  function goToYouTubePremium(){
    window.open('https://www.youtube.com/premium', '_blank');
  }

  // הודעת פתיחה - מוצגת פעם אחת בלבד, בפתיחה הראשונה של האפליקציה אי פעם במכשיר הזה
  const PREMIUM_INTRO_KEY = 'solmusic_seen_premium_intro';
  if (!localStorage.getItem(PREMIUM_INTRO_KEY)) {
    setTimeout(() => {
      document.getElementById('premiumIntroModal').classList.add('open');
    }, 600);
  }
  function closePremiumIntro(){
    document.getElementById('premiumIntroModal').classList.remove('open');
    localStorage.setItem(PREMIUM_INTRO_KEY, '1');
  }

  // ========================================================
  // בקשת תוכן - כל משתמש יכול להזין קישור לסרטון, זה נכנס
  // ל"ממתינים" בפאנל הניהול לאישור מהיר, בלי צורך בסיסמה מהצד הציבורי
  // ========================================================
  function openRequestModal(){
    document.getElementById('requestModal').classList.add('open');
    document.getElementById('requestMsg').textContent = '';
    document.getElementById('requestMsg').className = 'request-msg';
  }

  function closeRequestModal(){
    document.getElementById('requestModal').classList.remove('open');
    document.getElementById('requestUrlInput').value = '';
  }

  async function loadRequestCategories(){
    try{
      const res = await fetch(`${APPS_SCRIPT_URL}?action=categories`);
      const cats = await res.json();
      const sel = document.getElementById('requestCategorySelect');
      sel.innerHTML = cats.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
    }catch(err){ console.warn(err); }
  }
  loadRequestCategories();

  async function submitRequest(){
    const url = document.getElementById('requestUrlInput').value.trim();
    const category = document.getElementById('requestCategorySelect').value;
    const msgEl = document.getElementById('requestMsg');

    if (!url){
      msgEl.textContent = 'נא להדביק קישור לסרטון';
      msgEl.className = 'request-msg error';
      return;
    }

    msgEl.textContent = 'שולח בקשה...';
    msgEl.className = 'request-msg';

    try{
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ action:'requestVideo', videoUrl:url, category:category })
      });
      const data = await res.json();

      if (data.success){
        msgEl.textContent = data.fastTracked
          ? 'התוכן אושר אוטומטית וכבר זמין באפליקציה! 🎉'
          : 'הבקשה נשלחה! התוכן יעלה לאחר אישור';
        msgEl.className = 'request-msg success';
        setTimeout(closeRequestModal, 1800);
      } else {
        msgEl.textContent = data.error || 'משהו השתבש, נסי שוב';
        msgEl.className = 'request-msg error';
      }
    }catch(err){
      msgEl.textContent = 'שגיאת חיבור, נסי שוב';
      msgEl.className = 'request-msg error';
    }
  }

  // ========================================================
  // חיפוש - מחפש בכל התוכן המאושר (לא מוגבל לקטגוריה נוכחית),
  // כולל כל ההיסטוריה של הערוץ, לא רק מה שנטען לאחרונה
  // ========================================================
  const searchInput = document.getElementById('searchInput');
  const searchClear = document.getElementById('searchClear');
  let searchTimeout = null;
  let isSearchActive = false;

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim();
    searchClear.style.display = q ? 'block' : 'none';

    clearTimeout(searchTimeout);
    if (!q) {
      exitSearch();
      return;
    }
    // דיליי קצר כדי לא לשלוח בקשה על כל תו שמוקלד
    searchTimeout = setTimeout(() => runSearch(q), 600);
  });

  function clearSearch(){
    searchInput.value = '';
    searchClear.style.display = 'none';
    exitSearch();
  }

  function exitSearch(){
    if (!isSearchActive) return;
    isSearchActive = false;
    topCatsEl.style.display = 'flex';
    loadVideos(currentCategory);
  }

  async function runSearch(query){
    isSearchActive = true;
    topCatsEl.style.display = 'none';
    filterLabelEl.innerHTML = '';
    showSkeleton();
    try{
      const url = `${APPS_SCRIPT_URL}?action=smartSearch&q=${encodeURIComponent(query)}`;
      const res = await fetch(url);
      const data = await res.json();
      const videos = data.videos || [];

      const label = document.createElement('div');
      label.className = 'search-results-label';
      if (data.liveSearched){
        label.innerHTML = `נמצאו <b>${videos.length}</b> תוצאות עבור "${escapeHtml(query)}" · <span style="color:#6FA37A;">תוכן טרי מיוטיוב ✓</span>`;
      } else {
        label.innerHTML = videos.length
          ? `נמצאו <b>${videos.length}</b> תוצאות עבור "${escapeHtml(query)}"`
          : `אין תוצאות עבור "${escapeHtml(query)}"`;
      }

      renderVideos(videos);
      contentEl.insertBefore(label, contentEl.firstChild);
    }catch(err){
      contentEl.innerHTML = '<div class="empty-state">שגיאה בחיפוש. נסי שוב.</div>';
      console.warn(err);
    }
  }

  // ========================================================
  // רישום ה-Service Worker
  // ========================================================
  if('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js')
        .catch(err => console.warn('Service worker registration failed:', err));
    });
  }
</script>

</body>
</html>
